name: Update Bouncie data

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      auth_code:
        description: "One-time Bouncie auth code (paste here immediately after getting it)"
        required: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: bouncie-update
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    outputs:
      pages_ready: ${{ steps.upload.outcome }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Fetch Bouncie data
        id: fetch
        continue-on-error: true
        env:
          BOUNCIE_API_KEY: ${{ secrets.BOUNCIE_API_KEY }}
          BOUNCIE_CLIENT_ID: ${{ secrets.BOUNCIE_CLIENT_ID }}
          BOUNCIE_CLIENT_SECRET: ${{ secrets.BOUNCIE_CLIENT_SECRET }}
          BOUNCIE_USERNAME: ${{ secrets.BOUNCIE_USERNAME }}
          BOUNCIE_PASSWORD: ${{ secrets.BOUNCIE_PASSWORD }}
          BOUNCIE_REDIRECT_URI: ${{ secrets.BOUNCIE_REDIRECT_URI }}
          BOUNCIE_REFRESH_TOKEN: ${{ secrets.BOUNCIE_REFRESH_TOKEN }}
          BOUNCIE_AUTH_CODE: ${{ inputs.auth_code || secrets.BOUNCIE_AUTH_CODE }}
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: python scripts/fetch.py

      # Always commit data/oauth.json even if the rest of the run failed,
      # so the rotated token is never lost between runs.
      - name: Persist OAuth token
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/oauth.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No token change to commit."
          else
            git commit -m "chore: persist rotated OAuth token"
            git push
          fi

      - name: Commit data updates
        if: steps.fetch.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "data: refresh $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi

      - name: Build site
        if: steps.fetch.outcome == 'success'
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: |
          mkdir -p _site/data _site/assets
          cp index.html .nojekyll _site/
          cp assets/* _site/assets/
          cp data/last_updated.json _site/data/
          if [ -n "$DASHBOARD_PASSWORD" ]; then
            cp data/vehicles.json.enc data/trips.json.enc data/stats.json.enc \
               data/vehicle_history.json.enc _site/data/
          else
            cp data/vehicles.json data/trips.json data/stats.json \
               data/vehicle_history.json _site/data/
          fi

      - name: Package site for Pages
        if: steps.fetch.outcome == 'success'
        run: tar --dereference --hard-dereference --directory _site -cvf artifact.tar .

      - name: Upload Pages artifact
        if: steps.fetch.outcome == 'success'
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: artifact.tar
          if-no-files-found: error
          retention-days: 1

  deploy:
    needs: fetch
    runs-on: ubuntu-latest
    if: needs.fetch.outputs.pages_ready == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
